<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>PDF 转图片 - 免费在线工具 | PDF 工具箱</title>
        <meta
            name="description"
            content="免费在线将 PDF 转换为 JPG 或 PNG 格式图片打包下载。所有文件均在浏览器本地渲染，不上传服务器，保护隐私。"
        />
        <link
            rel="icon"
            href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.8em' font-size='100' fill='%236C63FF'>◈</text></svg>"
        />

        <link rel="stylesheet" href="css/style.css" />
        <style>
            #nav-pdf2img {
                background-color: var(--primary-soft);
                color: var(--primary);
                font-weight: bold;
            }
        </style>
    </head>
    <body>
        <div class="trust-banner">
            🔒 纯本地处理：所有操作均在浏览器内完成，文件绝不上传服务器，保护您的隐私安全。
        </div>

        <div class="app-body">
                        <!-- SIDEBAR -->
            <div class="sidebar"></div>


            <!-- MAIN CONTENT -->
            <div class="main-content">
                <div class="page-view">
                    <div class="header">
                        <h1>PDF 转图片</h1>
                        <span class="badge">高清渲染</span>
                    </div>

                    <div class="card">
                        <label for="pdfFileInput" class="split-file-btn" id="pdfDropZone">
                            点击选择 PDF 文件<span class="hide-on-mobile"
                                >（或将文件拖到此处）</span
                            >
                        </label>
                        <input type="file" id="pdfFileInput" accept="application/pdf,.pdf" />

                        <div id="fileInfoArea" class="file-loaded-card u-hidden">
                            <div id="pdfFileName" class="file-name">📄 filename.pdf (共 0 页)</div>
                            <button
                                type="button"
                                class="trash-btn"
                                id="pdfResetBtn"
                                title="移除文件"
                                aria-label="移除文件"
                            >
                                <svg viewBox="0 0 24 24" aria-hidden="true">
                                    <path
                                        d="M16 9v10H8V9h8m-1.5-6h-5l-1 1H5v2h14V4h-3.5l-1-1zM18 7H6v12c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7z"
                                    />
                                </svg>
                            </button>
                        </div>

                        <div class="settings-panel u-surface-panel">
                            <div class="mode-row u-mode-vertical">
                                <label class="u-label-strong">导出格式</label>
                                <select id="formatSelect" class="u-select-wide">
                                    <option value="image/jpeg">JPG (体积较小)</option>
                                    <option value="image/png">PNG (清晰度最高)</option>
                                </select>
                            </div>

                            <div class="mode-row u-mode-vertical">
                                <label class="u-label-strong">图片质量 (DPI)</label>
                                <select id="scaleSelect" class="u-select-wide">
                                    <option value="1">普通 (1x)</option>
                                    <option value="2" selected>高清 (2x 推荐)</option>
                                    <option value="3">超清 (3x 体积很大)</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="card action-card">
                        <span class="u-status-text" id="pdfStatusText">未加载文件</span>
                        <button class="btn btn-run" id="runPdfBtn" disabled>开始转换并打包</button>
                    </div>

                    <div class="u-flex-grow"></div>
                    <div class="footer">
                        <p>PDF 工具箱 © 2026 | <a href="#" class="privacy-link">隐私说明</a></p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Hidden canvas for rendering -->
        <canvas id="renderCanvas" class="u-hidden"></canvas>

        <script src="js/common.js"></script>
        <script src="js/vendor/pdf.min.js"></script>
        <script src="js/vendor/jszip.min.js"></script>
        <script src="js/pdf-to-img.js"></script>
    </body>
</html>
