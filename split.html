<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>拆分与提取 PDF 页面 - 免费在线工具 | PDF 工具箱</title>
        <meta
            name="description"
            content="免费在线拆分、提取 PDF 页面，支持按范围或分组导出。所有文件均在浏览器本地处理，不上传服务器，保护隐私。"
        />
        <link
            rel="icon"
            href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.8em' font-size='100' fill='%236C63FF'>◈</text></svg>"
        />

        <link rel="stylesheet" href="css/style.css" />
        <style>
            #nav-split {
                background-color: var(--primary-soft);
                color: var(--primary);
                font-weight: bold;
            }
        </style>
    </head>
    <body>
        <div class="trust-banner">
            🔒 纯本地处理：所有操作均在浏览器内完成，文件绝不上传服务器，保护您的隐私安全。
        </div>

        <div class="app-body">
            <!-- SIDEBAR -->
            <div class="sidebar"></div>

            <!-- MAIN CONTENT -->
            <div class="main-content">
                <div class="page-view">
                    <div class="header">
                        <h1>页面拆分 / 提取</h1>
                        <span class="badge badge-warning">多种模式</span>
                    </div>

                    <div class="card">
                        <!-- 未加载时的拖拽区 -->
                        <label for="splitFileInput" class="split-file-btn" id="splitDropZone">
                            点击选择 PDF 文件<span class="hide-on-mobile"
                                >（或将文件拖到此处）</span
                            >
                        </label>
                        <input type="file" id="splitFileInput" accept="application/pdf,.pdf" />

                        <!-- 加载成功后的漂亮卡片 -->
                        <div id="fileInfoArea" class="file-loaded-card u-hidden">
                            <div id="splitFileName" class="file-name">
                                📄 filename.pdf (共 0 页)
                            </div>
                            <button
                                type="button"
                                class="trash-btn"
                                id="splitResetBtn"
                                title="移除文件"
                                aria-label="移除文件"
                            >
                                <svg viewBox="0 0 24 24" aria-hidden="true">
                                    <path
                                        d="M16 9v10H8V9h8m-1.5-6h-5l-1 1H5v2h14V4h-3.5l-1-1zM18 7H6v12c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7z"
                                    />
                                </svg>
                            </button>
                        </div>

                        <div class="u-hint-text u-hint-center u-hint-top-tight">
                            建议单文件 &lt; 100MB，超大文件可能导致浏览器卡顿。
                        </div>

                        <div class="settings-panel u-surface-panel">
                            <div class="u-panel-title">拆分模式</div>

                            <div class="mode-row">
                                <label class="radio-label">
                                    <input type="radio" name="splitMode" value="all" checked />
                                    全部拆分为单页
                                </label>
                                <span class="mode-desc">每一页导出为独立 PDF 文件</span>
                            </div>

                            <div class="mode-row">
                                <label class="radio-label">
                                    <input type="radio" name="splitMode" value="range" />
                                    提取连续范围
                                </label>
                                <input
                                    type="number"
                                    id="rangeStart"
                                    placeholder="起始"
                                    class="u-w-80"
                                    disabled
                                />
                                <span class="u-text-dim">—</span>
                                <input
                                    type="number"
                                    id="rangeEnd"
                                    placeholder="结束"
                                    class="u-w-80"
                                    disabled
                                />
                                <span class="mode-desc"
                                    >示例：2 - 10，将提取该范围内页面合成一份</span
                                >
                            </div>

                            <div class="mode-row">
                                <label class="radio-label">
                                    <input type="radio" name="splitMode" value="group" /> 按分组导出
                                </label>
                                <input
                                    type="text"
                                    id="groupInput"
                                    placeholder="例如：1, 3, 5-8"
                                    class="u-w-200"
                                    disabled
                                />
                                <span class="mode-desc"
                                    >格式如：1, 3, 5-8（含 "-" 表示范围，单数字表示单页）</span
                                >
                            </div>
                        </div>
                    </div>

                    <div class="card action-card">
                        <span class="u-status-text" id="splitStatusText">未加载文件</span>
                        <button class="btn btn-run btn-run-danger" id="runSplitBtn" disabled>
                            执行拆分
                        </button>
                    </div>

                    <div class="u-flex-grow"></div>
                    <div class="footer">
                        <p>
                            PDF 工具箱 © 2026 |
                            <a href="privacy.html" class="privacy-link">隐私说明</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <script src="js/site-config.js"></script>
        <script src="js/common.js"></script>
        <script src="js/vendor/pdf-lib.min.js"></script>
        <script src="js/vendor/jszip.min.js"></script>
        <script src="js/split.js"></script>
    </body>
</html>
