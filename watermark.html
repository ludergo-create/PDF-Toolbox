<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>PDF 加水印 - 免费在线工具 | PDF 工具箱</title>
        <meta
            name="description"
            content="实时预览水印效果，双击单页可独立定制。完美支持中文，本地浏览器处理，绝对安全。"
        />
        <link
            rel="icon"
            href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.8em' font-size='100' fill='%236C63FF'>◈</text></svg>"
        />

        <link rel="stylesheet" href="css/style.css" />
        <style>
            #nav-watermark {
                background-color: var(--primary-soft);
                color: var(--primary);
                font-weight: bold;
            }
        </style>
    </head>
    <body>
        <div class="trust-banner">
            🔒 纯本地处理：所有操作均在浏览器内完成，文件绝不上传服务器，保护您的隐私安全。
        </div>

        <div class="app-body">
            <!-- SIDEBAR -->
            <div class="sidebar"></div>

            <!-- MAIN CONTENT -->
            <div class="main-content">
                <div class="page-view">
                    <div class="header">
                        <h1>PDF 加水印</h1>
                        <span class="badge">支持中文排版</span>
                    </div>

                    <div class="card">
                        <label for="wmFileInput" class="split-file-btn" id="wmDropZone">
                            点击选择 PDF 文件<span class="hide-on-mobile"
                                >（或将文件拖到此处）</span
                            >
                        </label>
                        <input type="file" id="wmFileInput" accept="application/pdf,.pdf" />

                        <div id="fileInfoArea" class="file-loaded-card u-hidden">
                            <div id="wmFileName" class="file-name">📄 filename.pdf</div>
                            <button
                                type="button"
                                class="trash-btn"
                                id="wmResetBtn"
                                title="移除文件"
                                aria-label="移除文件"
                            >
                                <svg viewBox="0 0 24 24" aria-hidden="true">
                                    <path
                                        d="M16 9v10H8V9h8m-1.5-6h-5l-1 1H5v2h14V4h-3.5l-1-1zM18 7H6v12c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7z"
                                    />
                                </svg>
                            </button>
                        </div>

                        <div class="settings-panel watermark-settings u-surface-panel-lg">
                            <div class="wm-tip wm-tip-highlight">
                                💡
                                提示：支持中英文混合。双击下方任意单页，即可为该页独立定制专属水印！
                            </div>

                            <div class="u-row-gap-16-wrap u-items-end">
                                <div class="setting-group u-flex-2-min-200">
                                    <label>全局文字</label>
                                    <input
                                        type="text"
                                        id="globalWmText"
                                        value="机密文件 CONFIDENTIAL"
                                        class="u-w-full"
                                    />
                                </div>
                                <div class="setting-group u-flex-1-min-120">
                                    <label>颜色</label>
                                    <select id="globalWmColor" class="u-w-full">
                                        <option value="#6B7280">灰色 (推荐)</option>
                                        <option value="#EF4444">红色</option>
                                        <option value="#3B82F6">蓝色</option>
                                        <option value="#111827">黑色</option>
                                    </select>
                                </div>
                                <div class="setting-group u-flex-1-min-120">
                                    <label>排布模式</label>
                                    <select id="globalWmMode" class="u-w-full">
                                        <option value="single">单条居中</option>
                                        <option value="tile">多行平铺</option>
                                    </select>
                                </div>
                                <div class="setting-group u-flex-1-min-120">
                                    <label>文字方向</label>
                                    <select id="globalWmFlip" class="u-w-full">
                                        <option value="none">正常 (默认)</option>
                                        <option value="reverse">文字倒序</option>
                                        <option value="rotate180">翻转 180°</option>
                                    </select>
                                </div>
                            </div>

                            <div class="u-row-gap-16-wrap u-mt-8">
                                <div class="setting-group u-flex-1-min-150">
                                    <label>透明度: <span id="valOpacity">0.3</span></label>
                                    <input
                                        type="range"
                                        id="globalWmOpacity"
                                        min="0.1"
                                        max="1"
                                        step="0.1"
                                        value="0.3"
                                        class="u-w-full"
                                    />
                                </div>
                                <div class="setting-group u-flex-1-min-150">
                                    <label>字体大小: <span id="valSize">100</span></label>
                                    <input
                                        type="range"
                                        id="globalWmSize"
                                        min="10"
                                        max="300"
                                        step="5"
                                        value="100"
                                        class="u-w-full"
                                    />
                                </div>
                                <div class="setting-group u-flex-1-min-150">
                                    <label>旋转角度: <span id="valAngle">45</span>°</label>
                                    <input
                                        type="range"
                                        id="globalWmAngle"
                                        min="0"
                                        max="360"
                                        step="5"
                                        value="45"
                                        class="u-w-full"
                                    />
                                </div>
                                <div class="setting-group u-flex-1-min-150 u-hidden">
                                    <label>水平间距: <span id="valGapX">100</span></label>
                                    <input
                                        type="range"
                                        id="globalWmGapX"
                                        min="0"
                                        max="300"
                                        step="10"
                                        value="100"
                                        class="u-w-full"
                                    />
                                </div>
                                <div class="setting-group u-flex-1-min-150 u-hidden">
                                    <label>垂直间距: <span id="valGapY">100</span></label>
                                    <input
                                        type="range"
                                        id="globalWmGapY"
                                        min="0"
                                        max="300"
                                        step="10"
                                        value="100"
                                        class="u-w-full"
                                    />
                                </div>
                            </div>
                        </div>

                        <!-- PDF 网格容器 -->
                        <div
                            id="wmPagesGrid"
                            class="pdf-page-grid wm-page-grid-offset u-hidden"
                        ></div>
                    </div>

                    <div class="card action-card">
                        <span class="u-status-text" id="wmStatusText">未加载文件</span>
                        <button class="btn btn-run" id="runWmBtn" disabled>添加水印并保存</button>
                    </div>

                    <div class="u-flex-grow"></div>
                    <div class="footer">
                        <p>
                            PDF 工具箱 © 2026 |
                            <a href="privacy.html" class="privacy-link">隐私说明</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Modal for Customizing Single Page -->
        <div
            id="wmModal"
            class="modal-overlay"
            role="dialog"
            aria-modal="true"
            aria-labelledby="modalTitle"
        >
            <div class="modal-content">
                <div class="modal-left u-position-relative">
                    <!-- 大图预览 -->
                    <div class="pdf-page-canvas-wrapper wm-modal-canvas-wrap" id="modalCanvasWrap">
                        <div id="modalZoomContainer" class="wm-modal-zoom-container">
                            <canvas
                                class="pdf-page-canvas wm-modal-canvas"
                                id="modalCanvas"
                            ></canvas>
                            <canvas
                                class="wm-canvas-overlay wm-modal-overlay-canvas"
                                id="modalWmCanvas"
                            ></canvas>
                        </div>
                    </div>
                    <div class="wm-modal-floating-tools">
                        <button class="btn btn-outline u-btn-zoom" id="wmModalZoomOutBtn">
                            －
                        </button>
                        <span id="modalZoomLevel" class="u-zoom-label-50">100%</span>
                        <button class="btn btn-outline u-btn-zoom" id="wmModalZoomInBtn">＋</button>
                        <button class="btn btn-outline u-btn-fit" id="wmModalFitBtn">
                            适应窗口
                        </button>
                    </div>
                </div>
                <div class="modal-right">
                    <div class="modal-right-scroll">
                        <h3 class="wm-modal-title" id="modalTitle">定制第 N 页</h3>

                        <div class="setting-group">
                            <label>专属文字</label>
                            <input type="text" id="modalWmText" class="u-w-full" />
                        </div>
                        <div class="setting-group">
                            <label>颜色</label>
                            <select id="modalWmColor" class="u-w-full">
                                <option value="#6B7280">灰色</option>
                                <option value="#EF4444">红色</option>
                                <option value="#3B82F6">蓝色</option>
                                <option value="#111827">黑色</option>
                            </select>
                        </div>
                        <div class="setting-group">
                            <label>排布模式</label>
                            <select id="modalWmMode" class="u-w-full">
                                <option value="single">单条居中</option>
                                <option value="tile">多行平铺</option>
                            </select>
                        </div>
                        <div class="setting-group">
                            <label>文字方向</label>
                            <select id="modalWmFlip" class="u-w-full">
                                <option value="none">正常 (默认)</option>
                                <option value="reverse">文字倒序</option>
                                <option value="rotate180">翻转 180°</option>
                            </select>
                        </div>
                        <div class="setting-group">
                            <label>透明度: <span id="modalValOpacity">0.3</span></label>
                            <input
                                type="range"
                                id="modalWmOpacity"
                                min="0.1"
                                max="1"
                                step="0.1"
                                value="0.3"
                                class="u-w-full"
                            />
                        </div>
                        <div class="setting-group">
                            <label>大小: <span id="modalValSize">100</span></label>
                            <input
                                type="range"
                                id="modalWmSize"
                                min="10"
                                max="300"
                                step="5"
                                value="100"
                                class="u-w-full"
                            />
                        </div>
                        <div class="setting-group">
                            <label>角度: <span id="modalValAngle">45</span>°</label>
                            <input
                                type="range"
                                id="modalWmAngle"
                                min="0"
                                max="360"
                                step="5"
                                value="45"
                                class="u-w-full"
                            />
                        </div>
                        <div class="setting-group" id="modalGapXGroup">
                            <label>水平间距: <span id="modalValGapX">100</span></label>
                            <input
                                type="range"
                                id="modalWmGapX"
                                min="0"
                                max="300"
                                step="10"
                                value="100"
                                class="u-w-full"
                            />
                        </div>
                        <div class="setting-group u-mb-24" id="modalGapYGroup">
                            <label>垂直间距: <span id="modalValGapY">100</span></label>
                            <input
                                type="range"
                                id="modalWmGapY"
                                min="0"
                                max="300"
                                step="10"
                                value="100"
                                class="u-w-full"
                            />
                        </div>
                    </div>

                    <div class="modal-right-actions">
                        <div class="wm-modal-actions-row">
                            <button
                                class="btn btn-outline u-flex-1 u-danger-outline"
                                id="modalClearCustomBtn"
                            >
                                恢复为全局设置
                            </button>
                            <button class="btn btn-outline u-flex-1" id="modalCancelBtn">
                                取消
                            </button>
                        </div>
                        <button class="btn btn-primary u-btn-block" id="modalSaveCustomBtn">
                            保存定制
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <script src="js/site-config.js"></script>
        <script src="js/common.js"></script>
        <script src="js/vendor/pdf.min.js"></script>
        <script src="js/vendor/pdf-lib.min.js"></script>
        <script src="js/watermark.js"></script>
    </body>
</html>
