<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>旋转与删除 PDF 页面 - 免费在线工具 | PDF 工具箱</title>
        <meta
            name="description"
            content="免费在线全景预览，直观操作旋转或删除不需要的 PDF 页面。本地处理，保护隐私。"
        />
        <link
            rel="icon"
            href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.8em' font-size='100' fill='%236C63FF'>◈</text></svg>"
        />

        <link rel="stylesheet" href="css/style.css" />
        <style>
            #nav-edit {
                background-color: var(--primary-soft);
                color: var(--primary);
                font-weight: bold;
            }
        </style>
    </head>
    <body>
        <div class="trust-banner">
            🔒 纯本地处理：所有操作均在浏览器内完成，文件绝不上传服务器，保护您的隐私安全。
        </div>

        <div class="app-body">
            <!-- SIDEBAR -->
            <div class="sidebar">
                <a href="index.html" class="logo-area">
                    <div class="logo-icon">◈</div>
                    <div class="logo-title">PDF 工具箱</div>
                </a>
                <div class="divider"></div>

                <div class="nav-label hide-on-mobile">工具导航</div>
                <a href="index.html" class="nav-btn" id="nav-home">首页</a>

                <div class="nav-label hide-on-mobile nav-label-spaced">核心处理</div>
                <a href="merge.html" class="nav-btn" id="nav-merge">合并 PDF</a>
                <a href="split.html" class="nav-btn" id="nav-split">拆分 / 提取</a>
                <a href="edit-pages.html" class="nav-btn" id="nav-edit">旋转与删除</a>

                <div class="nav-label hide-on-mobile nav-label-spaced">格式转换</div>
                <a href="pdf-to-img.html" class="nav-btn" id="nav-pdf2img">PDF 转图片</a>
                <a href="img-to-pdf.html" class="nav-btn" id="nav-img2pdf">图片转 PDF</a>

                <div class="nav-label hide-on-mobile nav-label-spaced">安全与保护</div>
                <a href="watermark.html" class="nav-btn" id="nav-watermark">PDF 加水印</a>

                <div class="spacer"></div>
                <button class="theme-toggle" id="themeBtn">切换深色</button>
            </div>

            <!-- MAIN CONTENT -->
            <div class="main-content">
                <div class="page-view">
                    <div class="header">
                        <h1>旋转与删除页面</h1>
                        <span class="badge">全景可视化</span>
                    </div>

                    <div class="card">
                        <!-- 拖拽区 -->
                        <label for="editFileInput" class="split-file-btn" id="editDropZone">
                            点击选择 PDF 文件<span class="hide-on-mobile"
                                >（或将文件拖到此处）</span
                            >
                        </label>
                        <input type="file" id="editFileInput" accept="application/pdf,.pdf" />

                        <!-- 卡片信息区 -->
                        <div id="fileInfoArea" class="file-loaded-card u-hidden">
                            <div id="editFileName" class="file-name">📄 filename.pdf (共 0 页)</div>
                            <button
                                type="button"
                                class="trash-btn"
                                id="editResetBtn"
                                title="移除文件"
                                aria-label="移除文件"
                            >
                                <svg viewBox="0 0 24 24">
                                    <path
                                        d="M16 9v10H8V9h8m-1.5-6h-5l-1 1H5v2h14V4h-3.5l-1-1zM18 7H6v12c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7z"
                                    />
                                </svg>
                            </button>
                        </div>

                        <!-- 全局操作栏 -->
                        <div
                            id="globalToolbar"
                            class="global-toolbar u-hidden u-surface-panel u-row-gap-12 u-items-center u-justify-between u-flex-wrap"
                        >
                            <span class="u-text-13-bold">全局操作：</span>
                            <div class="u-row-gap-8">
                                <button class="btn btn-outline" id="rotateAllLeftBtn">
                                    全体 ↺ 左转
                                </button>
                                <button class="btn btn-outline" id="rotateAllRightBtn">
                                    全体 ↻ 右转
                                </button>
                                <button class="btn btn-outline" id="recoverAllBtn">
                                    撤销全部删除
                                </button>
                            </div>
                        </div>

                        <!-- PDF 网格容器 -->
                        <div id="pagesGrid" class="pdf-page-grid u-hidden"></div>
                    </div>

                    <div class="card action-card">
                        <span class="u-status-text" id="editStatusText">未加载文件</span>
                        <button class="btn btn-run" id="runEditBtn" disabled>应用修改并保存</button>
                    </div>

                    <div class="u-flex-grow"></div>
                    <div class="footer">
                        <p>PDF 工具箱 © 2026 | <a href="#" class="privacy-link">隐私说明</a></p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Modal for Previewing Single Page -->
        <div
            id="previewModal"
            class="modal-overlay"
            role="dialog"
            aria-modal="true"
            aria-labelledby="previewModalTitle"
        >
            <div class="modal-content edit-preview-modal-content">
                <div class="edit-preview-header">
                    <h3 id="previewModalTitle" class="edit-preview-title">第 N 页预览</h3>
                    <div class="u-row-gap-12 u-items-center">
                        <div class="edit-preview-zoom-box">
                            <button
                                class="btn btn-outline u-btn-zoom-compact"
                                id="previewZoomOutBtn"
                            >
                                －
                            </button>
                            <span id="previewModalZoomLevel" class="u-zoom-label-40">100%</span>
                            <button
                                class="btn btn-outline u-btn-zoom-compact"
                                id="previewZoomInBtn"
                            >
                                ＋
                            </button>
                            <button class="btn btn-outline u-btn-fit-compact" id="previewFitBtn">
                                适应窗口
                            </button>
                        </div>
                        <button class="btn btn-outline" id="previewCloseBtn">关闭</button>
                    </div>
                </div>

                <div
                    class="pdf-page-canvas-wrapper edit-preview-canvas-wrap"
                    id="previewModalCanvasWrap"
                >
                    <div id="previewModalZoomContainer" class="edit-preview-zoom-container">
                        <div id="previewModalRotateContainer" class="edit-preview-rotate-container">
                            <canvas
                                class="pdf-page-canvas edit-preview-canvas"
                                id="previewModalCanvas"
                            ></canvas>
                            <div class="page-deleted-mask edit-preview-mask" id="previewModalMask">
                                已删除
                            </div>
                        </div>
                    </div>
                </div>

                <div class="edit-preview-actions">
                    <button class="btn btn-outline" id="previewRotateLeftBtn">↺ 左转</button>
                    <button class="btn btn-outline" id="previewRotateRightBtn">↻ 右转</button>
                    <button class="btn btn-outline u-danger-outline" id="previewModalDelBtn">
                        🗑️ 删除页面
                    </button>
                </div>
            </div>
        </div>

        <script src="js/common.js"></script>
        <script src="js/vendor/pdf.min.js"></script>
        <script src="js/vendor/pdf-lib.min.js"></script>
        <script>
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'js/vendor/pdf.worker.min.js';

            let editFileObj = null;
            let pdfTotalPages = 0;
            let pagesState = []; // [{deleted: false, rotation: 0}]
            let currentPreviewIdx = -1;

            let previewZoom = 1;
            let previewPanX = 0;
            let previewPanY = 0;
            let isPreviewPanning = false;
            let pStartX, pStartY;
            const editFileInput = document.getElementById('editFileInput');
            const editResetBtn = document.getElementById('editResetBtn');
            const rotateAllLeftBtn = document.getElementById('rotateAllLeftBtn');
            const rotateAllRightBtn = document.getElementById('rotateAllRightBtn');
            const recoverAllBtn = document.getElementById('recoverAllBtn');
            const runEditBtn = document.getElementById('runEditBtn');
            const previewZoomOutBtn = document.getElementById('previewZoomOutBtn');
            const previewZoomInBtn = document.getElementById('previewZoomInBtn');
            const previewFitBtn = document.getElementById('previewFitBtn');
            const previewCloseBtn = document.getElementById('previewCloseBtn');
            const previewRotateLeftBtn = document.getElementById('previewRotateLeftBtn');
            const previewRotateRightBtn = document.getElementById('previewRotateRightBtn');
            const previewModalDelBtn = document.getElementById('previewModalDelBtn');
            const previewModalFocus = createModalFocusManager(
                document.getElementById('previewModal'),
                closePreviewModal
            );

            editFileInput.addEventListener('change', handleEditFileAdded);
            editResetBtn.addEventListener('click', resetEditFile);
            rotateAllLeftBtn.addEventListener('click', () => rotateAll(-90));
            rotateAllRightBtn.addEventListener('click', () => rotateAll(90));
            recoverAllBtn.addEventListener('click', recoverAll);
            runEditBtn.addEventListener('click', runEdit);
            previewZoomOutBtn.addEventListener('click', () => zoomPreviewModal(-0.2));
            previewZoomInBtn.addEventListener('click', () => zoomPreviewModal(0.2));
            previewFitBtn.addEventListener('click', fitPreviewModalToWindow);
            previewCloseBtn.addEventListener('click', closePreviewModal);
            previewRotateLeftBtn.addEventListener('click', () => rotatePreviewPage(-90));
            previewRotateRightBtn.addEventListener('click', () => rotatePreviewPage(90));
            previewModalDelBtn.addEventListener('click', toggleDeletePreviewPage);

            document.addEventListener('DOMContentLoaded', () => {
                const wrap = document.getElementById('previewModalCanvasWrap');
                if (wrap) {
                    wrap.addEventListener('wheel', (e) => {
                        e.preventDefault();
                        const delta = e.deltaY < 0 ? 0.1 : -0.1;
                        zoomPreviewModal(delta);
                    });
                    wrap.addEventListener('mousedown', (e) => {
                        isPreviewPanning = true;
                        pStartX = e.clientX - previewPanX;
                        pStartY = e.clientY - previewPanY;
                        wrap.style.cursor = 'grabbing';
                    });
                    wrap.addEventListener('mousemove', (e) => {
                        if (!isPreviewPanning) return;
                        previewPanX = e.clientX - pStartX;
                        previewPanY = e.clientY - pStartY;
                        applyPreviewTransform();
                    });
                    wrap.addEventListener('mouseup', () => {
                        isPreviewPanning = false;
                        wrap.style.cursor = 'grab';
                    });
                    wrap.addEventListener('mouseleave', () => {
                        isPreviewPanning = false;
                        wrap.style.cursor = 'grab';
                    });
                }
            });

            function zoomPreviewModal(delta) {
                previewZoom = Math.max(0.1, Math.min(previewZoom + delta, 5));
                applyPreviewTransform();
            }

            function fitPreviewModalToWindow() {
                const wrap = document.getElementById('previewModalCanvasWrap');
                const canvas = document.getElementById('previewModalCanvas');
                if (canvas.width && canvas.height) {
                    const scaleX = (wrap.clientWidth - 40) / canvas.width;
                    const scaleY = (wrap.clientHeight - 40) / canvas.height;
                    previewZoom = Math.max(0.1, Math.min(scaleX, scaleY, 1));
                } else {
                    previewZoom = 1;
                }
                previewPanX = 0;
                previewPanY = 0;
                applyPreviewTransform();
            }

            function applyPreviewTransform() {
                const container = document.getElementById('previewModalZoomContainer');
                container.style.transform = `translate(${previewPanX}px, ${previewPanY}px) scale(${previewZoom})`;
                document.getElementById('previewModalZoomLevel').innerText =
                    Math.round(previewZoom * 100) + '%';
            }

            async function openPreviewModal(idx) {
                currentPreviewIdx = idx;
                document.getElementById('previewModalTitle').innerText = `第 ${idx + 1} 页预览`;

                const canvas = document.getElementById('previewModalCanvas');
                const ctx = canvas.getContext('2d');
                const arrayBuffer = await editFileObj.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                const page = await pdf.getPage(idx + 1);
                const viewport = page.getViewport({ scale: 2.0 }); // 高清渲染
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                await page.render({ canvasContext: ctx, viewport: viewport }).promise;

                updatePreviewModalState();
                document.getElementById('previewModal').style.display = 'flex';
                previewModalFocus.open();
                setTimeout(() => fitPreviewModalToWindow(), 10);
            }

            function updatePreviewModalState() {
                const state = pagesState[currentPreviewIdx];
                document.getElementById('previewModalRotateContainer').style.transform =
                    `rotate(${state.rotation}deg)`;
                document.getElementById('previewModalMask').style.display = state.deleted
                    ? 'flex'
                    : 'none';
                document.getElementById('previewModalDelBtn').innerText = state.deleted
                    ? '🔄 恢复页面'
                    : '🗑️ 删除页面';
            }
            function rotatePreviewPage(deg) {
                rotatePage(currentPreviewIdx, deg);
                updatePreviewModalState();
            }

            function toggleDeletePreviewPage() {
                toggleDeletePage(currentPreviewIdx);
                updatePreviewModalState();
            }

            function closePreviewModal() {
                document.getElementById('previewModal').style.display = 'none';
                previewModalFocus.close();
            }

            function normalizePageRotation(angle) {
                const normalized = ((angle % 360) + 360) % 360;
                return (Math.round(normalized / 90) * 90) % 360;
            }

            const editDropZone = document.getElementById('editDropZone');
            editDropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'copy';
            });
            editDropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                if (e.dataTransfer.files.length > 0) loadEditFile(e.dataTransfer.files[0]);
            });

            function handleEditFileAdded(event) {
                if (event.target.files.length > 0) loadEditFile(event.target.files[0]);
                event.target.value = '';
            }

            function resetEditFile() {
                editFileObj = null;
                document.getElementById('editDropZone').style.display = 'block';
                document.getElementById('fileInfoArea').style.display = 'none';
                document.getElementById('globalToolbar').style.display = 'none';
                document.getElementById('pagesGrid').style.display = 'none';
                document.getElementById('editStatusText').innerText = '未加载文件';
                document.getElementById('runEditBtn').disabled = true;
            }

            async function loadEditFile(file) {
                if (!isPdfFile(file)) {
                    alert('只能选择 PDF 文件！');
                    return;
                }
                editFileObj = file;

                const dropLabel = document.getElementById('editDropZone');
                const fileInfoArea = document.getElementById('fileInfoArea');
                const fileNameDiv = document.getElementById('editFileName');
                const status = document.getElementById('editStatusText');
                const btn = document.getElementById('runEditBtn');
                const grid = document.getElementById('pagesGrid');
                const toolbar = document.getElementById('globalToolbar');

                dropLabel.innerHTML = '正在解析并渲染文档...';
                try {
                    // 1. 获取 PDF
                    const arrayBuffer = await file.arrayBuffer();
                    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                    pdfTotalPages = pdf.numPages;

                    // 2. 初始化状态
                    pagesState = Array.from({ length: pdfTotalPages }, () => ({
                        deleted: false,
                        rotation: 0,
                    }));
                    grid.innerHTML = '';

                    // 3. 渲染缩略图
                    for (let i = 1; i <= pdfTotalPages; i++) {
                        const page = await pdf.getPage(i);
                        const viewport = page.getViewport({ scale: 0.5 }); // 缩略图比例

                        const item = document.createElement('div');
                        item.className = 'pdf-page-item';
                        item.id = `page-item-${i - 1}`;
                        item.addEventListener('dblclick', () => openPreviewModal(i - 1));
                        item.title = '双击放大预览并精细操作';

                        const canvasWrap = document.createElement('div');
                        canvasWrap.className = 'pdf-page-canvas-wrapper';

                        const canvas = document.createElement('canvas');
                        canvas.className = 'pdf-page-canvas';
                        canvas.id = `page-canvas-${i - 1}`;
                        canvas.width = viewport.width;
                        canvas.height = viewport.height;

                        const ctx = canvas.getContext('2d');
                        await page.render({ canvasContext: ctx, viewport: viewport }).promise;

                        const mask = document.createElement('div');
                        mask.className = 'page-deleted-mask';
                        mask.id = `page-mask-${i - 1}`;
                        mask.style.display = 'none';
                        mask.innerText = '已删除';

                        canvasWrap.appendChild(canvas);
                        canvasWrap.appendChild(mask);

                        const actions = document.createElement('div');
                        actions.className = 'pdf-page-actions';

                        const rotateLeftBtn = document.createElement('button');
                        rotateLeftBtn.className = 'page-btn';
                        rotateLeftBtn.type = 'button';
                        rotateLeftBtn.innerText = '↺';
                        rotateLeftBtn.addEventListener('click', () => rotatePage(i - 1, -90));

                        const rotateRightBtn = document.createElement('button');
                        rotateRightBtn.className = 'page-btn';
                        rotateRightBtn.type = 'button';
                        rotateRightBtn.innerText = '↻';
                        rotateRightBtn.addEventListener('click', () => rotatePage(i - 1, 90));

                        const deleteBtn = document.createElement('button');
                        deleteBtn.className = 'page-btn page-btn-danger';
                        deleteBtn.type = 'button';
                        deleteBtn.innerText = '🗑️';
                        deleteBtn.addEventListener('click', () => toggleDeletePage(i - 1));

                        const pageLabel = document.createElement('div');
                        pageLabel.className = 'page-number-label';
                        pageLabel.innerText = `第 ${i} 页`;

                        actions.appendChild(rotateLeftBtn);
                        actions.appendChild(rotateRightBtn);
                        actions.appendChild(deleteBtn);
                        actions.appendChild(pageLabel);

                        item.appendChild(canvasWrap);
                        item.appendChild(actions);
                        grid.appendChild(item);
                    }

                    // 4. 更新 UI
                    dropLabel.style.display = 'none';
                    dropLabel.innerHTML =
                        '点击选择 PDF 文件<span class="hide-on-mobile">（或将文件拖到此处）</span>';

                    fileInfoArea.style.display = 'flex';
                    fileNameDiv.innerText = `📄 ${file.name} (共 ${pdfTotalPages} 页)`;

                    toolbar.style.display = 'flex';
                    grid.style.display = 'grid';

                    status.innerText = '渲染完成，请直观地调整您的页面';
                    btn.disabled = false;
                } catch (e) {
                    console.error(e);
                    dropLabel.innerHTML = '❌ 读取失败，可能是加密文件。点击重试';
                    editFileObj = null;
                    btn.disabled = true;
                }
            }

            // 单页操作
            function rotatePage(idx, deg) {
                pagesState[idx].rotation = normalizePageRotation(pagesState[idx].rotation + deg);
                document.getElementById(`page-canvas-${idx}`).style.transform =
                    `rotate(${pagesState[idx].rotation}deg)`;
            }

            function toggleDeletePage(idx) {
                pagesState[idx].deleted = !pagesState[idx].deleted;
                document.getElementById(`page-mask-${idx}`).style.display = pagesState[idx].deleted
                    ? 'flex'
                    : 'none';
                document.getElementById(`page-item-${idx}`).style.opacity = pagesState[idx].deleted
                    ? '0.6'
                    : '1';
            }

            // 全局操作
            function rotateAll(deg) {
                for (let i = 0; i < pdfTotalPages; i++) {
                    rotatePage(i, deg);
                }
            }

            function recoverAll() {
                for (let i = 0; i < pdfTotalPages; i++) {
                    if (pagesState[i].deleted) toggleDeletePage(i);
                }
            }

            // 最终保存
            async function runEdit() {
                if (!editFileObj) return;

                // 检查是否全部删除了
                const aliveCount = pagesState.filter((p) => !p.deleted).length;
                if (aliveCount === 0) {
                    alert('您已删除了所有页面，无法保存！');
                    return;
                }

                const btn = document.getElementById('runEditBtn');
                const status = document.getElementById('editStatusText');

                btn.disabled = true;
                btn.innerText = '处理中...';
                status.innerText = '正在生成最终文档...';

                try {
                    const { PDFDocument, degrees } = PDFLib;
                    const arrayBuffer = await editFileObj.arrayBuffer();
                    const newDoc = await PDFDocument.load(arrayBuffer);

                    // 必须从后往前删，否则索引会乱
                    for (let i = pdfTotalPages - 1; i >= 0; i--) {
                        if (pagesState[i].deleted) {
                            newDoc.removePage(i);
                        } else {
                            const extraRot = pagesState[i].rotation;
                            if (extraRot !== 0) {
                                const page = newDoc.getPage(i);
                                const currentAngle = page.getRotation().angle;
                                page.setRotation(
                                    degrees(normalizePageRotation(currentAngle + extraRot))
                                );
                            }
                        }
                    }

                    const pdfBytes = await newDoc.save();
                    const baseName = editFileObj.name.replace(/\.[^/.]+$/, '');
                    triggerDownload(pdfBytes, `${baseName}_已调整.pdf`);

                    status.innerText = '✅ 修改完成，已下载';
                    status.style.color = 'var(--success)';
                } catch (e) {
                    console.error(e);
                    status.innerText = '❌ 处理失败';
                    status.style.color = 'var(--danger)';
                } finally {
                    btn.disabled = false;
                    btn.innerText = '应用修改并保存';
                    setTimeout(() => {
                        status.innerText = '文件已就绪，可继续调整';
                        status.style.color = 'var(--text-sub)';
                    }, 4000);
                }
            }
        </script>
    </body>
</html>
