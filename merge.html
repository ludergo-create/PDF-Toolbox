<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>合并 PDF 文件 - 免费在线工具 | PDF 工具箱</title>
        <meta
            name="description"
            content="免费在线合并多个 PDF 文件，支持拖拽排序。所有文件均在浏览器本地处理，不上传服务器，保护您的隐私安全。"
        />
        <link
            rel="icon"
            href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.8em' font-size='100' fill='%236C63FF'>◈</text></svg>"
        />

        <link rel="stylesheet" href="css/style.css" />
        <style>
            #nav-merge {
                background-color: var(--primary-soft);
                color: var(--primary);
                font-weight: bold;
            }
        </style>
    </head>
    <body>
        <div class="trust-banner">
            🔒 纯本地处理：所有操作均在浏览器内完成，文件绝不上传服务器，保护您的隐私安全。
        </div>

        <div class="app-body">
            <!-- SIDEBAR -->
            <div class="sidebar"></div>

            <!-- MAIN CONTENT -->
            <div class="main-content">
                <div class="page-view">
                    <div class="header">
                        <h1>合并 PDF 文件</h1>
                        <span class="badge">拖拽排序</span>
                    </div>

                    <div class="card card-stretch">
                        <div class="toolbar">
                            <label for="addFilesInput" class="btn btn-primary">＋ 选择文件</label>
                            <input
                                type="file"
                                id="addFilesInput"
                                multiple
                                accept="application/pdf,.pdf"
                            />
                            <button class="btn btn-outline" id="clearMergeBtn">清空列表</button>
                            <span class="u-toolbar-count" id="mergeFileCount">共 0 个文件</span>
                        </div>
                        <div class="u-hint-text">
                            建议单文件 &lt; 100MB，超大文件可能导致浏览器卡顿。
                        </div>

                        <div class="file-list-wrapper" id="mergeDropZone">
                            <ul class="file-list" id="sortableList"></ul>
                            <div class="empty-tip" id="mergeEmptyTip">
                                点击上方按钮选择 PDF 文件<span class="hide-on-mobile"
                                    >，或直接拖拽到此处</span
                                >
                            </div>
                        </div>
                    </div>

                    <div class="card action-card">
                        <span class="u-status-text" id="mergeStatusText"
                            >请选择至少 2 个 PDF 文件</span
                        >
                        <button class="btn btn-run" id="runMergeBtn" disabled>开始合并</button>
                    </div>

                    <div class="u-flex-grow"></div>
                    <div class="footer">
                        <p>PDF 工具箱 © 2026 | <a href="#" class="privacy-link">隐私说明</a></p>
                    </div>
                </div>
            </div>
        </div>

        <script src="js/common.js"></script>
        <script src="js/vendor/pdf-lib.min.js"></script>
        <script src="js/vendor/Sortable.min.js"></script>
        <script src="js/merge.js"></script>
    </body>
</html>
